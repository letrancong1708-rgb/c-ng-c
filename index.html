<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hào Quang Tỏa Toàn Phía - Giữa Trong Suốt</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        #app-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
        }
        
        #webcam { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
            filter: brightness(0.9);
            z-index: 1; 
        }
        
        #fog-canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; 
        }
        
        #halo-canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; 
        }
        
        #loading { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 14px; letter-spacing: 2px; background: rgba(0, 0, 0, 0.85); padding: 30px 50px; border-radius: 15px; z-index: 10; text-align: center; border: 1px solid rgba(255, 215, 0, 0.3); backdrop-filter: blur(10px);
        }

        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top-color: #ffd700; margin: 0 auto 20px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #debug-info { position: absolute; bottom: 20px; left: 20px; color: rgba(255, 255, 255, 0.7); background: rgba(0, 0, 0, 0.6); padding: 8px 15px; font-family: monospace; z-index: 20; font-size: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        #hint-text { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); color: #fff; font-size: 16px; letter-spacing: 2px; z-index: 5; text-shadow: 0 0 10px rgba(0, 0, 0, 0.8); pointer-events: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="hint-text">LAU SƯƠNG BẰNG 1 NGÓN TAY • CHẮP TRƯỚC NGỰC ĐỂ HIỆN HÀO QUANG TOÀN THÂN</div>
        <div id="debug-info">Đang khởi động camera hệ thống...</div>
        <div id="loading">
            <div class="spinner"></div>
            <div>ĐANG TẢI MÔ HÌNH HÀO QUANG TOÀN DIỆN...</div>
        </div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="fog-canvas"></canvas>
        <canvas id="halo-canvas"></canvas>
    </div>

<script>
    const videoElement = document.getElementById('webcam');
    const fogCanvas = document.getElementById('fog-canvas');
    const fogCtx = fogCanvas.getContext('2d');
    const haloCanvas = document.getElementById('halo-canvas');
    const haloCtx = haloCanvas.getContext('2d');
    const loadingDiv = document.getElementById('loading');
    const debugDiv = document.getElementById('debug-info');
    const hintText = document.getElementById('hint-text');

    let width, height;
    let fogOpacity = 0.93; 
    let isChắpTay = false;
    let haloAlpha = 0; 
    let latestHandResults = null; 
    
    let particles = [];
    const MAX_PARTICLES = 30;

    function resizeCanvases() {
        width = window.innerWidth;
        height = window.innerHeight;
        fogCanvas.width = width;
        fogCanvas.height = height;
        haloCanvas.width = width;
        haloCanvas.height = height;
        initFog();
    }

    function initFog() {
        fogCtx.clearRect(0, 0, width, height);
        fogCtx.fillStyle = `rgba(230, 235, 240, ${fogOpacity})`;
        fogCtx.fillRect(0, 0, width, height);
    }

    window.addEventListener('resize', resizeCanvases);
    resizeCanvases();

    // Sương tự tụ lại theo thời gian
    setInterval(() => {
        if (!isChắpTay) {
            let randomX = Math.random() * width;
            let randomY = Math.random() * height;
            let mistRadius = Math.random() * 160 + 100;
            let mistGrd = fogCtx.createRadialGradient(randomX, randomY, 0, randomX, randomY, mistRadius);
            mistGrd.addColorStop(0, 'rgba(230, 235, 240, 0.03)');
            mistGrd.addColorStop(1, 'rgba(230, 235, 240, 0)');
            fogCtx.save(); fogCtx.fillStyle = mistGrd; fogCtx.beginPath(); fogCtx.arc(randomX, randomY, mistRadius, 0, Math.PI * 2); fogCtx.fill(); fogCtx.restore();
            
            fogCtx.fillStyle = `rgba(230, 235, 240, 0.002)`;
            fogCtx.fillRect(0, 0, width, height);
        }
    }, 50);

    // Bụi lấp lánh nghệ thuật
    class Particle {
        constructor(x, y, isSpark = false) {
            this.x = x || Math.random() * width;
            this.y = y || Math.random() * height;
            this.size = Math.random() * 1.5 + (isSpark ? 2.5 : 0.6);
            this.speedX = (Math.random() - 0.5) * (isSpark ? 3 : 0.2);
            this.speedY = isSpark ? (Math.random() * 2 - 0.5) : (Math.random() * 0.4 + 0.1);
            this.alpha = 1;
            this.color = isSpark ? `hsl(${Math.random() * 20 + 40}, 100%, 70%)` : 'rgba(255,255,255,0.2)';
            this.life = isSpark ? 60 : 140;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life--;
            this.alpha = Math.max(0, this.life / (this.life > 40 ? 140 : 40));
        }
        draw(ctx) {
            ctx.save(); ctx.globalAlpha = this.alpha;
            if(this.color !== 'rgba(255,255,255,0.2)') { ctx.shadowBlur = 8; ctx.shadowColor = this.color; }
            ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        }
    }

    for(let i=0; i<MAX_PARTICLES; i++) { particles.push(new Particle()); }

    // CẬP NHẬT: Hào quang tỏa 360 độ xung quanh, giữa TRONG SUỐT nhìn rõ người
    function drawDivineHalo(ctx) {
        if (haloAlpha <= 0) return;

        // Đặt tâm hào quang ở chính giữa màn hình để tỏa đi toàn bộ các phía
        const centerX = width / 2;
        const centerY = height / 2;
        
        // Bán kính vùng trong suốt ở giữa (nơi chứa khuôn mặt bạn)
        const innerRadius = Math.min(width, height) * 0.25; 
        // Bán kính tổng thể của dải hào quang tỏa rộng ra rìa
        const outerRadius = Math.min(width, height) * 0.65; 

        ctx.save();
        ctx.globalAlpha = haloAlpha;
        
        // Tạo gradient tỏa tròn từ tâm ra ngoài
        let gradient = ctx.createRadialGradient(
            centerX, centerY, innerRadius, 
            centerX, centerY, outerRadius
        );
        
        // Thay đổi thông số Alpha: 0 là trong suốt hoàn toàn, 1 là đặc màu
        gradient.addColorStop(0, 'rgba(255, 235, 120, 0.05)');  // Chính giữa cực kỳ trong suốt (chỉ giữ 5% ánh mờ vàng)
        gradient.addColorStop(0.2, 'rgba(255, 210, 50, 0.3)');   // Bắt đầu gợn vàng nhẹ
        gradient.addColorStop(0.5, 'rgba(255, 140, 20, 0.75)');  // Thân hào quang màu Cam lửa rực sáng ở rìa ngoài
        gradient.addColorStop(0.8, 'rgba(240, 90, 10, 0.35)');   // Viền đỏ cam mờ dần bay ra xa
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');     // Trong suốt hoàn toàn ở rìa ngoài cùng

        ctx.fillStyle = gradient;
        
        // Vẽ phủ một hình tròn lớn chứa toàn bộ vùng gradient này
        ctx.beginPath();
        ctx.arc(centerX, centerY, outerRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Tự động dọn sương mù toàn bộ vùng hào quang chiếu tới để làm lộ ảnh camera rõ nét
        fogCtx.save();
        fogCtx.globalCompositeOperation = 'destination-out';
        fogCtx.fillStyle = 'rgba(0, 0, 0, 1)';
        fogCtx.beginPath();
        fogCtx.arc(centerX, centerY, outerRadius, 0, Math.PI * 2);
        fogCtx.fill();
        fogCtx.restore();
    }

    // KHUNG QUÉT TAY (Giữ nguyên giao diện hộp vàng nét đứt tinh tế)
    function drawHandYoloBox(ctx, results) {
        if (!results || !results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;

        let minX = width, maxX = 0, minY = height, maxY = 0;

        results.multiHandLandmarks.forEach((landmarks) => {
            landmarks.forEach((pt) => {
                const x = (1 - pt.x) * width;
                const y = pt.y * height;
                if (x < minX) minX = x; if (x > maxX) maxX = x;
                if (y < minY) minY = y; if (y > maxY) maxY = y;
            });
        });

        ctx.save();
        const padding = 30;
        ctx.strokeStyle = 'rgba(255, 200, 50, 0.7)'; 
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 5]); 
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'rgba(255, 200, 50, 0.4)';
        ctx.strokeRect(minX - padding, minY - padding, (maxX - minX) + padding * 2, (maxY - minY) + padding * 2);

        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.fillRect(minX - padding, minY - padding - 25, 240, 25);
        ctx.fillStyle = '#ffdf6d';
        ctx.font = 'bold 12px monospace';
        ctx.fillText(`prayer • 99% (tâm thanh tịnh) / min`, minX - padding + 8, minY - padding - 8);
        ctx.restore();
    }

    function mainRenderLoop() {
        haloCtx.clearRect(0, 0, width, height);

        if (isChắpTay) {
            if (haloAlpha < 1) haloAlpha += 0.08; 
        } else {
            if (haloAlpha > 0) haloAlpha -= 0.04; 
        }

        // Vẽ hào quang 360 độ trong suốt ở giữa
        drawDivineHalo(haloCtx);

        // Vẽ các hạt lấp lánh tự do
        particles.forEach((p, index) => {
            p.update(); p.draw(haloCtx);
            if (p.life <= 0) {
                if (particles.length > MAX_PARTICLES) particles.splice(index, 1);
                else particles[index] = new Particle();
            }
        });

        // Vẽ khung nhận diện
        if (latestHandResults && latestHandResults.multiHandLandmarks && latestHandResults.multiHandLandmarks.length > 0) {
            drawHandYoloBox(haloCtx, latestHandResults);
        }

        requestAnimationFrame(mainRenderLoop);
    }
    requestAnimationFrame(mainRenderLoop);

    let audioCtx = null;
    function playZenSound() {
        try {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 2.5);
        } catch(e) {}
    }

    function onResults(results) {
        if (loadingDiv) { loadingDiv.style.opacity = '0'; setTimeout(() => loadingDiv.style.display = 'none', 500); }

        latestHandResults = results;
        let detectedHandsCount = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
        
        if (detectedHandsCount > 0) {
            // Lau sương bằng ngón tay trỏ
            results.multiHandLandmarks.forEach((landmarks) => {
                const indexTip = landmarks[8];
                const x = (1 - indexTip.x) * width;
                const y = indexTip.y * height;

                fogCtx.save();
                fogCtx.globalCompositeOperation = 'destination-out';
                let brushRadius = 75; 
                let eraserGrd = fogCtx.createRadialGradient(x, y, brushRadius * 0.1, x, y, brushRadius);
                eraserGrd.addColorStop(0, 'rgba(0, 0, 0, 1)');
                eraserGrd.addColorStop(0.8, 'rgba(0, 0, 0, 0.8)');
                eraserGrd.addColorStop(1, 'rgba(0, 0, 0, 0)');
                fogCtx.fillStyle = eraserGrd; fogCtx.beginPath(); fogCtx.arc(x, y, brushRadius, 0, Math.PI * 2); fogCtx.fill(); fogCtx.restore();
                
                if(Math.random() < 0.3 && !isChắpTay) {
                    particles.push(new Particle(x, y, true));
                }
            });

            // Kiểm tra trạng thái chắp tay
            if (detectedHandsCount === 2) {
                const hand1 = results.multiHandLandmarks[0];
                const hand2 = results.multiHandLandmarks[1];

                const distWrist = Math.hypot(hand1[0].x - hand2[0].x, hand1[0].y - hand2[0].y);
                const distMcp = Math.hypot(hand1[9].x - hand2[9].x, hand1[9].y - hand2[9].y);
                const chắpTayDistance = (distWrist + distMcp) / 2;

                debugDiv.innerHTML = `Độ khít chắp tay: ${(100 - chắpTayDistance*400).toFixed(0)}%`;

                if (chắpTayDistance < 0.15) {
                    if (!isChắpTay) {
                        isChắpTay = true;
                        playZenSound(); 
                    }
                } else {
                    isChắpTay = false;
                }
            } else {
                isChắpTay = false;
                debugDiv.innerHTML = `Đã tìm thấy ${detectedHandsCount} bàn tay • Hãy chắp cả 2 tay lại`;
            }
        } else {
            isChắpTay = false;
            latestHandResults = null;
            debugDiv.innerHTML = "Đang chờ bàn tay xuất hiện...";
        }
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.55, minTrackingConfidence: 0.55 });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({ image: videoElement }); },
        width: 1280, height: 720
    });
    camera.start().catch(err => { debugDiv.innerHTML = "Không tìm thấy thiết bị Camera!"; });
</script>

</body>
</html>
