<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa lỗi phóng hào quang - Chắp tay tương tác</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #app-container { position: relative; width: 100vw; height: 100vh; }
        #webcam { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; }
        #fog-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        #halo-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 20px; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; z-index: 10; text-align: center; }
        
        /* Bảng gỡ lỗi hiển thị khoảng cách tay theo thời gian thực */
        #debug-info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff00;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            font-family: monospace;
            z-index: 20;
            font-size: 14px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="debug-info">Đang chờ camera...</div>
        <div id="loading">Đang khởi tạo Trí tuệ nhân tạo nhận diện tay...</div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="fog-canvas"></canvas>
        <canvas id="halo-canvas"></canvas>
    </div>

<script>
    const videoElement = document.getElementById('webcam');
    const fogCanvas = document.getElementById('fog-canvas');
    const fogCtx = fogCanvas.getContext('2d');
    const haloCanvas = document.getElementById('halo-canvas');
    const haloCtx = haloCanvas.getContext('2d');
    const loadingDiv = document.getElementById('loading');
    const debugDiv = document.getElementById('debug-info');

    let width, height;
    let fogOpacity = 0.85; 
    let isHaloAnimating = false;
    let haloRadius = 0;
    let haloMaxRadius = 0;

    function resizeCanvases() {
        width = window.innerWidth;
        height = window.innerHeight;
        fogCanvas.width = width;
        fogCanvas.height = height;
        haloCanvas.width = width;
        haloCanvas.height = height;
        haloMaxRadius = Math.sqrt(width * width + height * height);
        initFog();
    }

    function initFog() {
        fogCtx.save();
        fogCtx.fillStyle = `rgba(220, 225, 230, ${fogOpacity})`;
        fogCtx.fillRect(0, 0, width, height);
        fogCtx.filter = 'blur(8px)';
        fogCtx.restore();
    }

    window.addEventListener('resize', resizeCanvases);
    resizeCanvases();

    // Tích tụ lại sương mờ dần dần
    setInterval(() => {
        if (!isHaloAnimating && fogOpacity < 0.95) {
            fogOpacity += 0.003;
            fogCtx.fillStyle = `rgba(220, 225, 230, 0.015)`;
            fogCtx.fillRect(0, 0, width, height);
        }
    }, 100);

    // Kích hoạt hào quang phóng ra sạch màn hình
    function triggerHaloEffect() {
        if (isHaloAnimating) return;
        isHaloAnimating = true;
        haloRadius = 0;
        
        playHaloSound();

        function animateHalo() {
            haloCtx.clearRect(0, 0, width, height);
            
            const centerX = width / 2;
            const centerY = height / 2;
            haloRadius += 40; // Tăng tốc độ phóng hào quang nhanh hơn
            
            let gradient = haloCtx.createRadialGradient(centerX, centerY, haloRadius * 0.1, centerX, centerY, haloRadius);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');      
            gradient.addColorStop(0.15, 'rgba(255, 240, 150, 1)');  
            gradient.addColorStop(0.4, 'rgba(255, 165, 0, 0.6)');    
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');      

            haloCtx.fillStyle = gradient;
            haloCtx.beginPath();
            haloCtx.arc(centerX, centerY, haloRadius, 0, Math.PI * 2);
            haloCtx.fill();

            // Lau sạch sương mù theo vòng tròn hào quang mở rộng
            fogCtx.save();
            fogCtx.globalCompositeOperation = 'destination-out';
            fogCtx.fillStyle = 'rgba(0, 0, 0, 1)';
            fogCtx.beginPath();
            fogCtx.arc(centerX, centerY, haloRadius, 0, Math.PI * 2);
            fogCtx.fill();
            fogCtx.restore();

            if (haloRadius < haloMaxRadius) {
                requestAnimationFrame(animateHalo);
            } else {
                haloCtx.clearRect(0, 0, width, height);
                isHaloAnimating = false;
                fogOpacity = 0; 
            }
        }
        animateHalo();
    }

    function playHaloSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); // Nốt Rê cao ngân vang hơn
            gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.8);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.8);
        } catch(e) { console.log("Âm thanh bị chặn"); }
    }

    function onResults(results) {
        if (loadingDiv) loadingDiv.style.display = 'none';

        let detectedHandsCount = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
        
        if (detectedHandsCount > 0) {
            // Xử lý cử chỉ lau kính bằng ngón trỏ
            results.multiHandLandmarks.forEach((landmarks) => {
                const indexTip = landmarks[8];
                const x = (1 - indexTip.x) * width;
                const y = indexTip.y * height;

                fogCtx.save();
                fogCtx.globalCompositeOperation = 'destination-out';
                let brushRadius = 60;
                let eraserGrd = fogCtx.createRadialGradient(x, y, brushRadius * 0.2, x, y, brushRadius);
                eraserGrd.addColorStop(0, 'rgba(0, 0, 0, 1)');
                eraserGrd.addColorStop(1, 'rgba(0, 0, 0, 0)');
                fogCtx.fillStyle = eraserGrd;
                fogCtx.beginPath();
                fogCtx.arc(x, y, brushRadius, 0, Math.PI * 2);
                fogCtx.fill();
                fogCtx.restore();
            });

            // KIỂM TRA CHẮP TAY (Khi thấy đủ 2 tay)
            if (detectedHandsCount === 2) {
                const hand1 = results.multiHandLandmarks[0];
                const hand2 = results.multiHandLandmarks[1];

                // Tính khoảng cách giữa 2 cổ tay (Điểm số 0)
                const distWrist = Math.hypot(hand1[0].x - hand2[0].x, hand1[0].y - hand2[0].y);
                // Tính khoảng cách giữa 2 gốc ngón giữa (Điểm số 9)
                const distMcp = Math.hypot(hand1[9].x - hand2[9].x, hand1[9].y - hand2[9].y);
                
                // Khoảng cách trung bình của bàn tay đang chắp
                const chắpTayDistance = (distWrist + distMcp) / 2;

                // Cập nhật bảng gỡ lỗi để theo dõi
                debugDiv.innerHTML = `Số tay: 2 <br> Khoảng cách chắp: ${chắpTayDistance.toFixed(3)} <br> (Yêu cầu < 0.150 để kích hoạt)`;

                // Khi chắp tay lại sát nhau, khoảng cách chuẩn hóa thường giảm xuống dưới 0.15
                if (chắpTayDistance < 0.15 && !isHaloAnimating) {
                    triggerHaloEffect();
                }
            } else {
                debugDiv.innerHTML = `Số tay nhìn thấy: ${detectedHandsCount} <br> (Cần giơ cả 2 tay lên để chắp lạy)`;
            }
        } else {
            debugDiv.innerHTML = "Không tìm thấy bàn tay nào trước camera.";
        }
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5, // Giảm xuống một chút để nhạy hơn trong môi trường thiếu sáng
        minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({ image: videoElement });
        },
        width: 1280,
        height: 720
    });
    
    camera.start().catch(err => {
        debugDiv.innerHTML = "Lỗi kết nối Webcam!";
    });
</script>

</body>
</html>
