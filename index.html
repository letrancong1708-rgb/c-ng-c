<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trải nghiệm Tâm Linh Tương Tác Cao Cấp</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #050508; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        #app-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            background: radial-gradient(circle, #101428 0%, #050508 100%);
        }
        
        /* Webcam nền được làm nhòe mạnh để tạo không gian nghệ thuật bí ẩn */
        #webcam { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
            filter: blur(25px) brightness(0.4) contrast(1.2);
            z-index: 1; 
            opacity: 0.7;
        }
        
        /* Canvas sương mờ */
        #fog-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        /* Canvas hào quang và các hạt ánh sáng bay */
        #halo-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }
        
        /* Màn hình chờ phong cách Cyber-Zen tối giản, sang trọng */
        #loading { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: #e0e5ff; 
            font-size: 16px; 
            letter-spacing: 2px;
            background: rgba(10, 12, 26, 0.85); 
            padding: 30px 50px; 
            border-radius: 20px; 
            z-index: 10; 
            text-align: center; 
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            transition: opacity 0.8s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #ffd700;
            margin: 0 auto 20px;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Bảng hiển thị thông số thu nhỏ tinh tế ở góc dưới thay vì góc trên thô kệch */
        #debug-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 15px;
            font-family: monospace;
            z-index: 20;
            font-size: 11px;
            border-radius: 30px;
            pointer-events: none;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        
        /* Dòng chữ gợi ý ẩn hiện nhẹ nhàng ở giữa màn hình */
        #hint-text {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 235, 160, 0.8);
            font-size: 18px;
            letter-spacing: 3px;
            z-index: 5;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            pointer-events: none;
            text-align: center;
            animation: pulse 2.5s infinite ease-in-out;
            font-weight: 300;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translateX(-50%) scale(0.98); }
            50% { opacity: 0.9; transform: translateX(-50%) scale(1.02); }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="hint-text">HÃY DÙNG TAY LAU MÀN HÌNH HOẶC CHẮP TAY LẠY</div>
        <div id="debug-info">Đang kết nối hệ thống...</div>
        <div id="loading">
            <div class="spinner"></div>
            <div>ĐANG KHỞI TẠO KHÔNG GIAN TƯƠNG TÁC</div>
        </div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="fog-canvas"></canvas>
        <canvas id="halo-canvas"></canvas>
    </div>

<script>
    const videoElement = document.getElementById('webcam');
    const fogCanvas = document.getElementById('fog-canvas');
    const fogCtx = fogCanvas.getContext('2d');
    const haloCanvas = document.getElementById('halo-canvas');
    const haloCtx = haloCanvas.getContext('2d');
    const loadingDiv = document.getElementById('loading');
    const debugDiv = document.getElementById('debug-info');
    const hintText = document.getElementById('hint-text');

    let width, height;
    let fogOpacity = 0.9; 
    let isHaloAnimating = false;
    let haloRadius = 0;
    let haloMaxRadius = 0;
    
    // Mảng chứa các hạt ánh sáng lơ lửng tạo chiều sâu thẩm mỹ
    let particles = [];
    const MAX_PARTICLES = 40;

    function resizeCanvases() {
        width = window.innerWidth;
        height = window.innerHeight;
        fogCanvas.width = width;
        fogCanvas.height = height;
        haloCanvas.width = width;
        haloCanvas.height = height;
        haloMaxRadius = Math.sqrt(width * width + height * height);
        initFog();
    }

    // Tạo lớp sương mù thẩm mỹ: màu xanh đá sang trọng trộn lẫn khói trắng nhạt
    function initFog() {
        fogCtx.clearRect(0, 0, width, height);
        
        // Tạo gradient sương mờ sang trọng có chiều sâu
        let fogGrd = fogCtx.createLinearGradient(0, 0, width, height);
        fogGrd.addColorStop(0, `rgba(24, 28, 43, ${fogOpacity})`);
        fogGrd.addColorStop(0.5, `rgba(45, 52, 71, ${fogOpacity})`);
        fogGrd.addColorStop(1, `rgba(17, 20, 31, ${fogOpacity})`);
        
        fogCtx.fillStyle = fogGrd;
        fogCtx.fillRect(0, 0, width, height);
    }

    window.addEventListener('resize', resizeCanvases);
    resizeCanvases();

    // Sương mù tự động tụ lại nhẹ nhàng hơn, mượt hơn
    setInterval(() => {
        if (!isHaloAnimating && fogOpacity < 0.95) {
            fogOpacity += 0.002;
            fogCtx.fillStyle = `rgba(20, 24, 38, 0.01)`;
            fogCtx.fillRect(0, 0, width, height);
        }
    }, 100);

    // Khởi tạo các hạt ánh sáng tâm linh bay lơ lửng ngẫu nhiên trên màn hình
    class Particle {
        constructor(x, y, isSpark = false) {
            this.x = x || Math.random() * width;
            this.y = y || Math.random() * height;
            this.size = Math.random() * 3 + (isSpark ? 2 : 1);
            this.speedX = (Math.random() - 0.5) * (isSpark ? 4 : 0.6);
            this.speedY = (Math.random() - 0.7) * (isSpark ? 4 : 0.8);
            this.alpha = Math.random() * 0.5 + 0.5;
            this.color = isSpark ? `hsl(${Math.random() * 20 + 40}, 100%, 70%)` : '#dbe0ff';
            this.life = isSpark ? 40 : 100;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life--;
            if (this.alpha > 0.01) this.alpha -= 0.005;
        }
        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // Sinh ra các hạt nền bay sẵn từ đầu
    for(let i=0; i<MAX_PARTICLES; i++) { particles.push(new Particle()); }

    // Vòng lặp vẽ hiệu ứng hạt liên tục
    function renderParticlesLoop() {
        if (!isHaloAnimating) {
            haloCtx.clearRect(0, 0, width, height);
            // Cập nhật và vẽ hạt lơ lửng thông thường
            particles.forEach((p, index) => {
                p.update();
                p.draw(haloCtx);
                if (p.life <= 0 || p.alpha <= 0) {
                    particles[index] = new Particle(); // Thay hạt mới khi hạt cũ biến mất
                }
            });
        }
        requestAnimationFrame(renderParticlesLoop);
    }
    renderParticlesLoop();

    // Hiệu ứng Sóng chấn động Hào quang Kim Sắc rực rỡ
    function triggerHaloEffect() {
        if (isHaloAnimating) return;
        isHaloAnimating = true;
        haloRadius = 0;
        
        // Ẩn dòng chữ gợi ý đi khi đang phóng hào quang
        hintText.style.opacity = '0';
        playHaloSound();

        // Tạo chấn động nổ tung các hạt sáng từ tâm màn hình
        particles = [];
        const centerX = width / 2;
        const centerY = height / 2;
        for (let i = 0; i < 80; i++) {
            particles.push(new Particle(centerX, centerY, true));
        }

        function animateHalo() {
            haloCtx.clearRect(0, 0, width, height);
            
            // 1. Cập nhật và vẽ các hạt vụn sáng bùng nổ
            particles.forEach((p) => {
                p.update();
                p.draw(haloCtx);
            });

            // 2. Vẽ vòng tròn sóng thần hào quang vàng kim
            haloRadius += 45; 
            
            let gradient = haloCtx.createRadialGradient(centerX, centerY, haloRadius * 0.3, centerX, centerY, haloRadius);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');       // Tâm lõi trắng tinh khiết
            gradient.addColorStop(0.1, 'rgba(255, 235, 130, 0.95)'); // Sóng vàng kim loại rực rỡ
            gradient.addColorStop(0.3, 'rgba(240, 140, 20, 0.4)');   // Viền lửa cam tỏa năng lượng
            gradient.addColorStop(0.8, 'rgba(255, 220, 100, 0.05)'); // Sóng dạt mỏng nhẹ
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');      

            haloCtx.save();
            haloCtx.shadowBlur = 30;
            haloCtx.shadowColor = '#ffd700';
            haloCtx.fillStyle = gradient;
            haloCtx.beginPath();
            haloCtx.arc(centerX, centerY, haloRadius, 0, Math.PI * 2);
            haloCtx.fill();
            haloCtx.restore();

            // 3. Quét sạch sương mờ mịn màng
            fogCtx.save();
            fogCtx.globalCompositeOperation = 'destination-out';
            fogCtx.fillStyle = 'rgba(0, 0, 0, 1)';
            fogCtx.beginPath();
            fogCtx.arc(centerX, centerY, haloRadius, 0, Math.PI * 2);
            fogCtx.fill();
            fogCtx.restore();

            if (haloRadius < haloMaxRadius) {
                requestAnimationFrame(animateHalo);
            } else {
                // Kết thúc hiệu ứng
                haloCtx.clearRect(0, 0, width, height);
                isHaloAnimating = false;
                fogOpacity = 0; 
                // Reset lại mảng hạt lơ lửng hòa bình
                particles = [];
                for(let i=0; i<MAX_PARTICLES; i++) { particles.push(new Particle()); }
                
                // Hiện lại chữ gợi ý sau 3 giây thanh tịnh
                setTimeout(() => { if(!isHaloAnimating) hintText.style.opacity = '1'; }, 3000);
            }
        }
        animateHalo();
    }

    // m thanh chuông ngân chu kỳ tần số cao thanh tịnh
    function playHaloSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime); // Nốt Mi thanh thoát linh thiêng
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5); // Ngân siêu dài 2.5s
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 2.5);
        } catch(e) { console.log("m thanh bị chặn"); }
    }

    function onResults(results) {
        if (loadingDiv) {
            loadingDiv.style.opacity = '0';
            setTimeout(() => loadingDiv.style.display = 'none', 800);
        }

        let detectedHandsCount = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
        
        if (detectedHandsCount > 0) {
            // Xử lý cọ lau mềm mượt, bo góc mờ nghệ thuật
            results.multiHandLandmarks.forEach((landmarks) => {
                const indexTip = landmarks[8];
                const x = (1 - indexTip.x) * width;
                const y = indexTip.y * height;

                fogCtx.save();
                fogCtx.globalCompositeOperation = 'destination-out';
                let brushRadius = 70; // Tăng cọ lau rộng hơn cho dễ lau
                let eraserGrd = fogCtx.createRadialGradient(x, y, brushRadius * 0.1, x, y, brushRadius);
                eraserGrd.addColorStop(0, 'rgba(0, 0, 0, 1)');
                eraserGrd.addColorStop(0.5, 'rgba(0, 0, 0, 0.5)');
                eraserGrd.addColorStop(1, 'rgba(0, 0, 0, 0)');
                fogCtx.fillStyle = eraserGrd;
                fogCtx.beginPath();
                fogCtx.arc(x, y, brushRadius, 0, Math.PI * 2);
                fogCtx.fill();
                fogCtx.restore();
                
                // Đồng thời sinh hạt ánh sáng lấp lánh ngay tại đầu ngón tay khi di chuyển lau kính
                if(Math.random() < 0.4 && !isHaloAnimating) {
                    particles.push(new Particle(x, y, true));
                    if(particles.length > MAX_PARTICLES + 20) particles.shift();
                }
            });

            // KIỂM TRA CHẮP TAY
            if (detectedHandsCount === 2) {
                const hand1 = results.multiHandLandmarks[0];
                const hand2 = results.multiHandLandmarks[1];

                const distWrist = Math.hypot(hand1[0].x - hand2[0].x, hand1[0].y - hand2[0].y);
                const distMcp = Math.hypot(hand1[9].x - hand2[9].x, hand1[9].y - hand2[9].y);
                const chắpTayDistance = (distWrist + distMcp) / 2;

                debugDiv.style.color = '#ffd700';
                debugDiv.innerHTML = `Hệ thống ổn định • Độ khít chắp tay: ${(100 - chắpTayDistance*400).toFixed(0)}%`;

                if (chắpTayDistance < 0.15 && !isHaloAnimating) {
                    triggerHaloEffect();
                }
            } else {
                debugDiv.style.color = 'rgba(255,255,255,0.4)';
                debugDiv.innerHTML = `Hệ thống sẵn sàng • Đã tìm thấy ${detectedHandsCount} tay`;
            }
        } else {
            debugDiv.innerHTML = "Đang chờ bàn tay xuất hiện...";
        }
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.55,
        minTrackingConfidence: 0.55
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({ image: videoElement }); },
        width: 1280,
        height: 720
    });
    
    camera.start().catch(err => {
        debugDiv.innerHTML = "Lỗi kết nối thiết bị camera!";
    });
</script>

</body>
</html>
