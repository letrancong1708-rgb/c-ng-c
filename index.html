<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hào Quang Tỏa Sáng - Nhạc Tùy Chỉnh</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        #app-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
        }
        
        #webcam { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
            filter: brightness(0.85); 
            z-index: 1; 
        }
        
        #fog-canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; 
        }
        
        #halo-canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; 
        }
        
        #loading { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 16px; letter-spacing: 2px; background: rgba(0, 0, 0, 0.85); padding: 30px 50px; border-radius: 15px; z-index: 10; text-align: center; border: 1px solid rgba(255, 215, 0, 0.3); backdrop-filter: blur(10px); transition: opacity 0.5s ease;
        }

        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top-color: #ffd700; margin: 0 auto 20px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #debug-info { position: absolute; bottom: 20px; left: 20px; color: rgba(255, 255, 255, 0.7); background: rgba(0, 0, 0, 0.6); padding: 8px 15px; font-family: monospace; z-index: 20; font-size: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        #hint-text { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); color: #fff; font-size: 18px; letter-spacing: 2px; z-index: 5; text-shadow: 0 0 10px rgba(0, 0, 0, 0.8); pointer-events: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="app-container">
        <audio id="halo-music" src="tieng_chuong_1_tieng_keo_dai_vang_vong-www_tiengdong_com.mp3" preload="auto"></audio>

        <div id="hint-text">LAU SƯƠNG BẰNG 1 NGÓN TAY • CHẮP TAY ĐỂ PHÓNG SÓNG HÀO QUANG</div>
        <div id="debug-info">Đang khởi động camera...</div>
        <div id="loading">
            <div class="spinner"></div>
            <div>ĐANG TẢI AI NHẬN DIỆN BÀN TAY...</div>
        </div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="fog-canvas"></canvas>
        <canvas id="halo-canvas"></canvas>
    </div>

<script>
    const videoElement = document.getElementById('webcam');
    const fogCanvas = document.getElementById('fog-canvas');
    const fogCtx = fogCanvas.getContext('2d');
    const haloCanvas = document.getElementById('halo-canvas');
    const haloCtx = haloCanvas.getContext('2d');
    const loadingDiv = document.getElementById('loading');
    const debugDiv = document.getElementById('debug-info');
    const hintText = document.getElementById('hint-text');
    
    // Khai báo thẻ nhạc công cụ
    const haloMusic = document.getElementById('halo-music');

    let width, height;
    let fogOpacity = 0.93; 
    let isHaloAnimating = false;
    let haloRadius = 0;
    let haloMaxRadius = 0;
    
    let particles = [];
    const MAX_PARTICLES = 25;

    function resizeCanvases() {
        width = window.innerWidth;
        height = window.innerHeight;
        fogCanvas.width = width;
        fogCanvas.height = height;
        haloCanvas.width = width;
        haloCanvas.height = height;
        haloMaxRadius = Math.sqrt(width * width + height * height);
        initFog();
    }

    function initFog() {
        fogCtx.clearRect(0, 0, width, height);
        fogCtx.fillStyle = `rgba(230, 235, 240, ${fogOpacity})`;
        fogCtx.fillRect(0, 0, width, height);
    }

    window.addEventListener('resize', resizeCanvases);
    resizeCanvases();

    // Sương tự tụ lại nhanh chóng
    setInterval(() => {
        if (!isHaloAnimating && fogOpacity < 0.95) {
            fogCtx.fillStyle = `rgba(230, 235, 240, 0.015)`;
            fogCtx.fillRect(0, 0, width, height);
        }
    }, 40);

    // Hạt ánh sáng lơ lửng
    class Particle {
        constructor(x, y, isSpark = false) {
            this.x = x || Math.random() * width;
            this.y = y || Math.random() * height;
            this.size = Math.random() * 2 + (isSpark ? 3 : 1);
            this.speedX = (Math.random() - 0.5) * (isSpark ? 6 : 0.4);
            this.speedY = (Math.random() - 0.7) * (isSpark ? 6 : 0.4);
            this.alpha = 1;
            this.color = isSpark ? `hsl(${Math.random() * 20 + 45}, 100%, 65%)` : 'rgba(255,255,255,0.4)';
            this.life = isSpark ? 40 : 120;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life--;
            this.alpha = Math.max(0, this.life / (this.life > 30 ? 120 : 30));
        }
        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            if(this.color !== 'rgba(255,255,255,0.4)') {
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
            }
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    for(let i=0; i<MAX_PARTICLES; i++) { particles.push(new Particle()); }

    function renderParticlesLoop() {
        if (!isHaloAnimating) {
            haloCtx.clearRect(0, 0, width, height);
            particles.forEach((p, index) => {
                p.update();
                p.draw(haloCtx);
                if (p.life <= 0) particles[index] = new Particle();
            });
        }
        requestAnimationFrame(renderParticlesLoop);
    }
    renderParticlesLoop();

    // Phóng sóng hào quang kết hợp phát nhạc tự chọn
    function triggerHaloEffect() {
        if (isHaloAnimating) return;
        isHaloAnimating = true;
        haloRadius = 0;
        
        hintText.style.opacity = '0';
        
        // GỌI HÀM PHÁT NHẠC THAY CHO TIẾNG BÍP CŨ
        playCustomMusic();

        particles = [];
        const centerX = width / 2;
        const centerY = height / 2;

        function animateHalo() {
            haloCtx.clearRect(0, 0, width, height);
            
            particles.forEach((p, index) => {
                p.update();
                p.draw(haloCtx);
                if(p.life <= 0) particles.splice(index, 1);
            });

            haloRadius += 35; 
            
            if (haloRadius < haloMaxRadius) {
                for (let i = 0; i < 5; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let pX = centerX + Math.cos(angle) * haloRadius;
                    let pY = centerY + Math.sin(angle) * haloRadius;
                    particles.push(new Particle(pX, pY, true));
                }
            }

            let waveWidth = 80; 
            
            haloCtx.save();
            haloCtx.lineWidth = waveWidth;
            let gradient = haloCtx.createRadialGradient(
                centerX, centerY, Math.max(0, haloRadius - waveWidth), 
                centerX, centerY, haloRadius + waveWidth
            );
            gradient.addColorStop(0, 'rgba(255, 215, 0, 0)');     
            gradient.addColorStop(0.4, 'rgba(255, 240, 160, 0.9)'); 
            gradient.addColorStop(0.5, 'rgba(255, 255, 255, 1)');   
            gradient.addColorStop(0.6, 'rgba(255, 140, 0, 0.8)');   
            gradient.addColorStop(1, 'rgba(255, 215, 0, 0)');     
            
            haloCtx.strokeStyle = gradient;
            haloCtx.shadowBlur = 40;
            haloCtx.shadowColor = '#ffd700'; 
            
            haloCtx.beginPath();
            haloCtx.arc(centerX, centerY, haloRadius, 0, Math.PI * 2);
            haloCtx.stroke();
            haloCtx.restore();

            fogCtx.save();
            fogCtx.globalCompositeOperation = 'destination-out';
            fogCtx.fillStyle = 'rgba(0, 0, 0, 1)';
            fogCtx.beginPath();
            fogCtx.arc(centerX, centerY, haloRadius + 20, 0, Math.PI * 2);
            fogCtx.fill();
            fogCtx.restore();

            if (haloRadius < haloMaxRadius) {
                requestAnimationFrame(animateHalo);
            } else {
                haloCtx.clearRect(0, 0, width, height);
                isHaloAnimating = false;
                fogOpacity = 0; 
                particles = [];
                for(let i=0; i<MAX_PARTICLES; i++) { particles.push(new Particle()); }
                setTimeout(() => { if(!isHaloAnimating) hintText.style.opacity = '1'; }, 3000);
            }
        }
        animateHalo();
    }

    // LÀM SAO ĐỂ ĐỔI NHẠC: 
    // Cách 1: Thay thế đường link ở dòng 43 (`src="đường_dẫn_nhạc_của_bạn.mp3"`)
    // Cách 2: Nếu để file nhạc cùng thư mục với file code này, chỉ cần sửa thành src="ten_file.mp3"
    function playCustomMusic() {
        if (haloMusic) {
            haloMusic.currentTime = 0; // Tua nhanh về giây đầu tiên (để mỗi lần chắp tay là nhạc chạy từ đầu)
            haloMusic.volume = 0.6;    // Bạn có thể chỉnh độ to nhỏ âm lượng ở đây (từ 0.0 đến 1.0)
            haloMusic.play().catch(err => {
                console.log("Trình duyệt chặn phát tự động, cần tương tác trước khi chạy ứng dụng.");
            });
        }
    }

    function onResults(results) {
        if (loadingDiv) {
            loadingDiv.style.opacity = '0';
            setTimeout(() => loadingDiv.style.display = 'none', 500);
        }

        let detectedHandsCount = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
        
        if (detectedHandsCount > 0) {
            results.multiHandLandmarks.forEach((landmarks) => {
                const indexTip = landmarks[8];
                const x = (1 - indexTip.x) * width;
                const y = indexTip.y * height;

                fogCtx.save();
                fogCtx.globalCompositeOperation = 'destination-out';
                
                let brushRadius = 75; 
                let eraserGrd = fogCtx.createRadialGradient(x, y, brushRadius * 0.2, x, y, brushRadius);
                eraserGrd.addColorStop(0, 'rgba(0, 0, 0, 1)');
                eraserGrd.addColorStop(0.8, 'rgba(0, 0, 0, 0.8)');
                eraserGrd.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                fogCtx.fillStyle = eraserGrd;
                fogCtx.beginPath();
                fogCtx.arc(x, y, brushRadius, 0, Math.PI * 2);
                fogCtx.fill();
                fogCtx.restore();
                
                if(Math.random() < 0.4 && !isHaloAnimating) {
                    particles.push(new Particle(x, y, true));
                    if(particles.length > MAX_PARTICLES + 20) particles.shift();
                }
            });

            if (detectedHandsCount === 2) {
                const hand1 = results.multiHandLandmarks[0];
                const hand2 = results.multiHandLandmarks[1];

                const distWrist = Math.hypot(hand1[0].x - hand2[0].x, hand1[0].y - hand2[0].y);
                const distMcp = Math.hypot(hand1[9].x - hand2[9].x, hand1[9].y - hand2[9].y);
                const chắpTayDistance = (distWrist + distMcp) / 2;

                debugDiv.innerHTML = `Độ khít chắp tay: ${(100 - chắpTayDistance*400).toFixed(0)}% (Cần > 40%)`;

                if (chắpTayDistance < 0.15 && !isHaloAnimating) {
                    triggerHaloEffect();
                }
            } else {
                debugDiv.innerHTML = `Đã nhận diện ${detectedHandsCount} tay • Hãy lau màn hình`;
            }
        } else {
            debugDiv.innerHTML = "Đang chờ bàn tay xuất hiện...";
        }
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.55,
        minTrackingConfidence: 0.55
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({ image: videoElement }); },
        width: 1280,
        height: 720
    });
    camera.start().catch(err => { debugDiv.innerHTML = "Lỗi kết nối Camera!"; });
</script>

</body>
</html>
