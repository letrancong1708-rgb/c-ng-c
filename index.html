<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa lỗi lau sương mờ - Tương tác trực quan</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        #app-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
        }
        
        /* Webcam nền HIỂN THỊ RÕ NÉT, chỉ giảm sáng nhẹ để làm nổi bật hào quang */
        #webcam { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); /* Lật gương tự nhiên */
            filter: brightness(0.7); 
            z-index: 1; 
        }
        
        /* Canvas chứa lớp sương mù trắng đục */
        #fog-canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 2; 
            pointer-events: none; 
        }
        
        /* Canvas chứa các hạt lấp lánh và hào quang vàng kim */
        #halo-canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 3; 
            pointer-events: none; 
        }
        
        /* Màn hình chờ tải hệ thống */
        #loading { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: #fff; 
            font-size: 16px; 
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.85); 
            padding: 30px 50px; 
            border-radius: 15px; 
            z-index: 10; 
            text-align: center; 
            border: 1px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px);
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #ffd700;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Bảng hiển thị trạng thái tinh tế ở góc màn hình */
        #debug-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px;
            font-family: monospace;
            z-index: 20;
            font-size: 12px;
            border-radius: 20px;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Hướng dẫn tương tác ẩn hiện nhẹ nhàng */
        #hint-text {
            position: absolute;
            top: 12%;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 18px;
            letter-spacing: 2px;
            z-index: 5;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="hint-text">DÙNG 1 NGÓN TAY ĐỂ LAU SƯƠNG • CHẮP 2 TAY ĐỂ PHÓNG HÀO QUANG</div>
        <div id="debug-info">Đang khởi động hệ thống camera...</div>
        <div id="loading">
            <div class="spinner"></div>
            <div>ĐANG TẢI TRÍ TUỆ NHÂN TẠO NHẬN DIỆN...</div>
        </div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="fog-canvas"></canvas>
        <canvas id="halo-canvas"></canvas>
    </div>

<script>
    const videoElement = document.getElementById('webcam');
    const fogCanvas = document.getElementById('fog-canvas');
    const fogCtx = fogCanvas.getContext('2d');
    const haloCanvas = document.getElementById('halo-canvas');
    const haloCtx = haloCanvas.getContext('2d');
    const loadingDiv = document.getElementById('loading');
    const debugDiv = document.getElementById('debug-info');

    let width, height;
    let fogOpacity = 0.93; // Độ đặc của sương mờ ban đầu
    let isHaloAnimating = false;
    let haloRadius = 0;
    let haloMaxRadius = 0;
    
    let particles = [];
    const MAX_PARTICLES = 30;

    function resizeCanvases() {
        width = window.innerWidth;
        height = window.innerHeight;
        fogCanvas.width = width;
        fogCanvas.height = height;
        haloCanvas.width = width;
        haloCanvas.height = height;
        haloMaxRadius = Math.sqrt(width * width + height * height);
        initFog();
    }

    // Tạo lớp sương mù ĐỤC MÀU TRẮNG SỮA dày đặc để thấy rõ vết lau
    function initFog() {
        fogCtx.clearRect(0, 0, width, height);
        
        // Vẽ nền sương mù trắng xám dày
        fogCtx.fillStyle = `rgba(225, 230, 235, ${fogOpacity})`;
        fogCtx.fillRect(0, 0, width, height);
        
        // Làm mịn mờ rìa sương bằng bộ lọc blur của Canvas
        fogCtx.save();
        fogCtx.filter = 'blur(4px)';
        fogCtx.restore();
    }

    window.addEventListener('resize', resizeCanvases);
    resizeCanvases();

    // Sương mù tự động tụ lại cực kỳ chậm để người dùng kịp lau và nhìn ngắm
    setInterval(() => {
        if (!isHaloAnimating && fogOpacity < 0.95) {
            fogCtx.fillStyle = `rgba(225, 230, 235, 0.005)`;
            fogCtx.fillRect(0, 0, width, height);
        }
    }, 150);

    // Lớp hạt lấp lánh tâm linh bay lơ lửng nghệ thuật
    class Particle {
        constructor(x, y, isSpark = false) {
            this.x = x || Math.random() * width;
            this.y = y || Math.random() * height;
            this.size = Math.random() * 3 + (isSpark ? 3 : 1);
            this.speedX = (Math.random() - 0.5) * (isSpark ? 5 : 0.5);
            this.speedY = (Math.random() - 0.7) * (isSpark ? 5 : 0.5);
            this.alpha = 1;
            this.color = isSpark ? `hsl(${Math.random() * 25 + 45}, 100%, 65%)` : 'rgba(255,255,255,0.5)';
            this.life = isSpark ? 30 : 120;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life--;
            this.alpha = Math.max(0, this.life / (this.life > 30 ? 120 : 30));
        }
        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            if(this.color !== 'rgba(255,255,255,0.5)') {
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
            }
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // Khởi tạo các hạt lơ lửng ban đầu
    for(let i=0; i<MAX_PARTICLES; i++) { particles.push(new Particle()); }

    function renderParticlesLoop() {
        if (!isHaloAnimating) {
            haloCtx.clearRect(0, 0, width, height);
            particles.forEach((p, index) => {
                p.update();
                p.draw(haloCtx);
                if (p.life <= 0) {
                    particles[index] = new Particle();
                }
            });
        }
        requestAnimationFrame(renderParticlesLoop);
    }
    renderParticlesLoop();

    // Hiệu ứng Sóng chấn động Hào quang Kim Sắc quét sạch sương mù
    function triggerHaloEffect() {
        if (isHaloAnimating) return;
        isHaloAnimating = true;
        haloRadius = 0;
        
        playHaloSound();

        // Tạo vụ nổ hạt sáng tại trung tâm
        particles = [];
        const centerX = width / 2;
        const centerY = height / 2;
        for (let i = 0; i < 60; i++) {
            particles.push(new Particle(centerX, centerY, true));
        }

        function animateHalo() {
            haloCtx.clearRect(0, 0, width, height);
            
            // Vẽ các hạt nổ bung
            particles.forEach((p) => {
                p.update();
                p.draw(haloCtx);
            });

            // Vẽ vòng tròn sóng thần hào quang phát sáng
            haloRadius += 45; 
            
            let gradient = haloCtx.createRadialGradient(centerX, centerY, haloRadius * 0.2, centerX, centerY, haloRadius);
            gradient.addColorStop(0, '#ffffff');                     
            gradient.addColorStop(0.15, '#ffdf6d'); 
            gradient.addColorStop(0.4, '#ff9618');   
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');      

            haloCtx.save();
            haloCtx.shadowBlur = 25;
            haloCtx.shadowColor = '#ffd700';
            haloCtx.fillStyle = gradient;
            haloCtx.beginPath();
            haloCtx.arc(centerX, centerY, haloRadius, 0, Math.PI * 2);
            haloCtx.fill();
            haloCtx.restore();

            // QUÉT DỌN SẠCH SƯƠNG MÙ
            fogCtx.save();
            fogCtx.globalCompositeOperation = 'destination-out';
            fogCtx.fillStyle = 'rgba(0, 0, 0, 1)';
            fogCtx.beginPath();
            fogCtx.arc(centerX, centerY, haloRadius, 0, Math.PI * 2);
            fogCtx.fill();
            fogCtx.restore();

            if (haloRadius < haloMaxRadius) {
                requestAnimationFrame(animateHalo);
            } else {
                haloCtx.clearRect(0, 0, width, height);
                isHaloAnimating = false;
                fogOpacity = 0; 
                particles = [];
                for(let i=0; i<MAX_PARTICLES; i++) { particles.push(new Particle()); }
            }
        }
        animateHalo();
    }

    function playHaloSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.2); 
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 2.2);
        } catch(e) {}
    }

    function onResults(results) {
        if (loadingDiv) {
            loadingDiv.style.opacity = '0';
            setTimeout(() => loadingDiv.style.display = 'none', 500);
        }

        let detectedHandsCount = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
        
        if (detectedHandsCount > 0) {
            // XỬ LÝ LAU SƯƠNG MỜ BẰNG ĐẦU NGÓN TAY TRỎ
            results.multiHandLandmarks.forEach((landmarks) => {
                const indexTip = landmarks[8]; // Ngón trỏ
                const x = (1 - indexTip.x) * width;
                const y = indexTip.y * height;

                fogCtx.save();
                // Thay đổi thuộc tính xóa pixel để đục thủng lớp sương trắng làm lộ webcam nét căng phía sau
                fogCtx.globalCompositeOperation = 'destination-out';
                
                let brushRadius = 75; // Kích thước cọ lau lớn để lau cho dễ và rõ ràng
                let eraserGrd = fogCtx.createRadialGradient(x, y, brushRadius * 0.2, x, y, brushRadius);
                eraserGrd.addColorStop(0, 'rgba(0, 0, 0, 1)');
                eraserGrd.addColorStop(0.8, 'rgba(0, 0, 0, 0.8)');
                eraserGrd.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                fogCtx.fillStyle = eraserGrd;
                fogCtx.beginPath();
                fogCtx.arc(x, y, brushRadius, 0, Math.PI * 2);
                fogCtx.fill();
                fogCtx.restore();
                
                // Đồng thời tạo các hạt bụi vàng óng bắn ra ngay tại vị trí ngón tay đang lau kính
                if(Math.random() < 0.5 && !isHaloAnimating) {
                    particles.push(new Particle(x, y, true));
                    if(particles.length > MAX_PARTICLES + 30) particles.shift();
                }
            });

            // KIỂM TRA CHẮP TAY PHÓNG HÀO QUANG
            if (detectedHandsCount === 2) {
                const hand1 = results.multiHandLandmarks[0];
                const hand2 = results.multiHandLandmarks[1];

                const distWrist = Math.hypot(hand1[0].x - hand2[0].x, hand1[0].y - hand2[0].y);
                const distMcp = Math.hypot(hand1[9].x - hand2[9].x, hand1[9].y - hand2[9].y);
                const chắpTayDistance = (distWrist + distMcp) / 2;

                debugDiv.innerHTML = `Độ khít chắp tay: ${(100 - chắpTayDistance*400).toFixed(0)}% (Cần đạt > 40% để lạy)`;

                if (chắpTayDistance < 0.15 && !isHaloAnimating) {
                    triggerHaloEffect();
                }
            } else {
                debugDiv.innerHTML = `Đã nhận diện ${detectedHandsCount} tay • Hãy lau màn hình`;
            }
        } else {
            debugDiv.innerHTML = "Đang chờ bàn tay xuất hiện trước webcam...";
        }
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.55,
        minTrackingConfidence: 0.55
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({ image: videoElement }); },
        width: 1280,
        height: 720
    });
    
    camera.start().catch(err => {
        debugDiv.innerHTML = "Không tìm thấy thiết bị Camera!";
    });
</script>

</body>
</html>
