<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sóng Hào Quang Nhẹ Nhàng - Có Khung Nhận Diện AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        #app-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
        }
        
        #webcam { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
            filter: brightness(0.85); 
            z-index: 1; 
        }
        
        #fog-canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; 
        }
        
        /* Canvas chứa cả hào quang và khung xương nhận diện tay */
        #halo-canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; 
        }
        
        #loading { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 16px; letter-spacing: 2px; background: rgba(0, 0, 0, 0.85); padding: 30px 50px; border-radius: 15px; z-index: 10; text-align: center; border: 1px solid rgba(255, 215, 0, 0.3); backdrop-filter: blur(10px); transition: opacity 0.5s ease;
        }

        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top-color: #ffd700; margin: 0 auto 20px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #debug-info { position: absolute; bottom: 20px; left: 20px; color: rgba(255, 255, 255, 0.7); background: rgba(0, 0, 0, 0.6); padding: 8px 15px; font-family: monospace; z-index: 20; font-size: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        #hint-text { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); color: #fff; font-size: 18px; letter-spacing: 2px; z-index: 5; text-shadow: 0 0 10px rgba(0, 0, 0, 0.8); pointer-events: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="hint-text">LAU SƯƠNG BẰNG 1 NGÓN TAY • CHẮP TAY ĐỂ PHÓNG SÓNG HÀO QUANG</div>
        <div id="debug-info">Đang khởi động hệ thống camera...</div>
        <div id="loading">
            <div class="spinner"></div>
            <div>ĐANG TẢI AI KHUNG NHẬN DIỆN...</div>
        </div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="fog-canvas"></canvas>
        <canvas id="halo-canvas"></canvas>
    </div>

<script>
    const videoElement = document.getElementById('webcam');
    const fogCanvas = document.getElementById('fog-canvas');
    const fogCtx = fogCanvas.getContext('2d');
    const haloCanvas = document.getElementById('halo-canvas');
    const haloCtx = haloCanvas.getContext('2d');
    const loadingDiv = document.getElementById('loading');
    const debugDiv = document.getElementById('debug-info');
    const hintText = document.getElementById('hint-text');

    let width, height;
    let fogOpacity = 0.93; 
    let isHaloAnimating = false;
    let haloRadius = 0;
    let haloMaxRadius = 0;
    let latestHandResults = null; // Lưu dữ liệu tay để render liên tục
    
    let particles = [];
    const MAX_PARTICLES = 20;

    function resizeCanvases() {
        width = window.innerWidth;
        height = window.innerHeight;
        fogCanvas.width = width;
        fogCanvas.height = height;
        haloCanvas.width = width;
        haloCanvas.height = height;
        haloMaxRadius = Math.sqrt(width * width + height * height);
        initFog();
    }

    function initFog() {
        fogCtx.clearRect(0, 0, width, height);
        fogCtx.fillStyle = `rgba(230, 235, 240, ${fogOpacity})`;
        fogCtx.fillRect(0, 0, width, height);
    }

    window.addEventListener('resize', resizeCanvases);
    resizeCanvases();

    // Sương tự tụ lại rất chậm
    setInterval(() => {
        if (!isHaloAnimating && fogOpacity < 0.95) {
            fogCtx.fillStyle = `rgba(230, 235, 240, 0.003)`;
            fogCtx.fillRect(0, 0, width, height);
        }
    }, 200);

    // Hạt lơ lửng nhỏ nhẹ
    class Particle {
        constructor(x, y, isSpark = false) {
            this.x = x || Math.random() * width;
            this.y = y || Math.random() * height;
            this.size = Math.random() * 1.5 + (isSpark ? 2.5 : 0.8);
            this.speedX = (Math.random() - 0.5) * (isSpark ? 3 : 0.3);
            this.speedY = (Math.random() - 0.7) * (isSpark ? 3 : 0.3);
            this.alpha = 1;
            this.color = isSpark ? `hsl(${Math.random() * 15 + 45}, 100%, 75%)` : 'rgba(255,255,255,0.3)';
            this.life = isSpark ? 50 : 120;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life--;
            this.alpha = Math.max(0, this.life / (this.life > 30 ? 120 : 30));
        }
        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            if(this.color !== 'rgba(255,255,255,0.3)') {
                ctx.shadowBlur = 6;
                ctx.shadowColor = this.color;
            }
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    for(let i=0; i<MAX_PARTICLES; i++) { particles.push(new Particle()); }

    // VẼ KHUNG NHẬN DIỆN VÀ KHUNG XƯƠNG TAY TRỰC QUAN
    function drawHandTracking(ctx, results) {
        if (!results || !results.multiHandLandmarks) return;

        results.multiHandLandmarks.forEach((landmarks) => {
            let minX = width, maxX = 0, minY = height, maxY = 0;

            // Vẽ các khớp ngón tay
            ctx.save();
            ctx.fillStyle = '#00f3ff';
            ctx.shadowBlur = 5;
            ctx.shadowColor = '#00f3ff';
            
            landmarks.forEach((pt) => {
                const x = (1 - pt.x) * width;
                const y = pt.y * height;
                
                // Tìm rìa để vẽ bounding box
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;

                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            // Vẽ khung vuông bao quanh bàn tay (Bounding Box)
            const padding = 25;
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.4)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 4]); // Nét đứt công nghệ
            ctx.strokeRect(minX - padding, minY - padding, (maxX - minX) + padding * 2, (maxY - minY) + padding * 2);
            ctx.restore();
        });
    }

    // MAIN LOOP: Render hạt lấp lánh và khung xương AI
    function mainRenderLoop() {
        haloCtx.clearRect(0, 0, width, height);

        // 1. Vẽ hạt lơ lửng (chỉ vẽ khi không có hào quang lớn)
        if (!isHaloAnimating) {
            particles.forEach((p, index) => {
                p.update();
                p.draw(haloCtx);
                if (p.life <= 0) particles[index] = new Particle();
            });
        }

        // 2. Vẽ khung tracking lên trên cùng giúp người dùng căn chỉnh tay chính xác
        drawHandTracking(haloCtx, latestHandResults);

        requestAnimationFrame(mainRenderLoop);
    }
    requestAnimationFrame(mainRenderLoop);

    // HIỆU ỨNG: Phóng những làn sóng nhẹ nhàng, thanh thoát
    function triggerHaloEffect() {
        if (isHaloAnimating) return;
        isHaloAnimating = true;
        haloRadius = 0;
        
        hintText.style.opacity = '0';
        playZenBellSound(); // Đổi âm thanh thiền

        particles = [];
        const centerX = width / 2;
        const centerY = height / 2;

        function animateHalo() {
            // Tốc độ lan tỏa giảm xuống (+18 thay vì +35) để tạo sự nhẹ nhàng
            haloRadius += 18; 
            
            // Thêm vài hạt sáng nương theo sóng bay ra
            if (haloRadius < haloMaxRadius) {
                for (let i = 0; i < 2; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let pX = centerX + Math.cos(angle) * haloRadius;
                    let pY = centerY + Math.sin(angle) * haloRadius;
                    particles.push(new Particle(pX, pY, true));
                }
            }

            // VẼ LÀN SÓNG PHÓNG NHẸ NHÀNG (Độ dày mỏng hơn, mờ ảo mịn màng hơn)
            let waveWidth = 50; 
            
            // Tạo một canvas phụ tạm thời để vẽ sóng tách biệt, tránh đè lên khung xương tay
            let waveCanvas = document.createElement('canvas');
            waveCanvas.width = width;
            waveCanvas.height = height;
            let waveCtx = waveCanvas.getContext('2d');

            waveCtx.lineWidth = waveWidth;
            let gradient = waveCtx.createRadialGradient(
                centerX, centerY, Math.max(0, haloRadius - waveWidth), 
                centerX, centerY, haloRadius + waveWidth
            );
            gradient.addColorStop(0, 'rgba(255, 223, 110, 0)');     
            gradient.addColorStop(0.5, 'rgba(255, 235, 170, 0.65)'); // Giảm nhẹ độ trong suốt xuống 0.65 cho dịu mát
            gradient.addColorStop(0.6, 'rgba(255, 255, 255, 0.8)');   
            gradient.addColorStop(1, 'rgba(255, 180, 50, 0)');     
            
            waveCtx.strokeStyle = gradient;
            waveCtx.shadowBlur = 30;
            waveCtx.shadowColor = 'rgba(255, 215, 0, 0.5)';
            
            waveCtx.beginPath();
            waveCtx.arc(centerX, centerY, haloRadius, 0, Math.PI * 2);
            waveCtx.stroke();

            // Vẽ canvas sóng chèn vào main canvas
            haloCtx.drawImage(waveCanvas, 0, 0);

            // LAU SẠCH SƯƠNG
            fogCtx.save();
            fogCtx.globalCompositeOperation = 'destination-out';
            fogCtx.fillStyle = 'rgba(0, 0, 0, 1)';
            fogCtx.beginPath();
            fogCtx.arc(centerX, centerY, haloRadius + 15, 0, Math.PI * 2);
            fogCtx.fill();
            fogCtx.restore();

            if (haloRadius < haloMaxRadius) {
                requestAnimationFrame(animateHalo);
            } else {
                isHaloAnimating = false;
                fogOpacity = 0; 
                particles = [];
                for(let i=0; i<MAX_PARTICLES; i++) { particles.push(new Particle()); }
                setTimeout(() => { if(!isHaloAnimating) hintText.style.opacity = '1'; }, 3000);
            }
        }
        animateHalo();
    }

    // ÂM THANH MỚI: Tiếng chuông "Ding~" ngân vang cõi thiền
    function playZenBellSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Âm chính nguyên bản thanh khiết
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(880, audioCtx.currentTime); // Nốt A5 cao trong trẻo
            
            // Âm hưởng hài hòa ngân vang sâu lắng
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(1320, audioCtx.currentTime); // Quãng năm hoàn hảo tạo độ dầy thanh tịnh
            
            gain1.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3.0); // Ngân vang dài 3 giây dập tắt dần
            
            gain2.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.0);

            osc1.connect(gain1); gain1.connect(audioCtx.destination);
            osc2.connect(gain2); gain2.connect(audioCtx.destination);
            
            osc1.start(); osc2.start();
            osc1.stop(audioCtx.currentTime + 3.0);
            osc2.stop(audioCtx.currentTime + 3.0);
        } catch(e) {}
    }

    function onResults(results) {
        if (loadingDiv) {
            loadingDiv.style.opacity = '0';
            setTimeout(() => loadingDiv.style.display = 'none', 500);
        }

        // Cập nhật kết quả tay vào biến toàn cục để vòng lặp draw liên tục cập nhật khung tracking
        latestHandResults = results;
        let detectedHandsCount = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
        
        if (detectedHandsCount > 0) {
            // Di chuyển vuốt ngón trỏ để lau sương
            results.multiHandLandmarks.forEach((landmarks) => {
                const indexTip = landmarks[8];
                const x = (1 - indexTip.x) * width;
                const y = indexTip.y * height;

                fogCtx.save();
                fogCtx.globalCompositeOperation = 'destination-out';
                
                let brushRadius = 75; 
                let eraserGrd = fogCtx.createRadialGradient(x, y, brushRadius * 0.2, x, y, brushRadius);
                eraserGrd.addColorStop(0, 'rgba(0, 0, 0, 1)');
                eraserGrd.addColorStop(0.8, 'rgba(0, 0, 0, 0.8)');
                eraserGrd.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                fogCtx.fillStyle = eraserGrd;
                fogCtx.beginPath();
                fogCtx.arc(x, y, brushRadius, 0, Math.PI * 2);
                fogCtx.fill();
                fogCtx.restore();
                
                if(Math.random() < 0.3 && !isHaloAnimating) {
                    particles.push(new Particle(x, y, true));
                }
            });

            // Đo đạc khoảng cách kiểm tra chắp 2 tay phóng hào quang
            if (detectedHandsCount === 2) {
                const hand1 = results.multiHandLandmarks[0];
                const hand2 = results.multiHandLandmarks[1];

                const distWrist = Math.hypot(hand1[0].x - hand2[0].x, hand1[0].y - hand2[0].y);
                const distMcp = Math.hypot(hand1[9].x - hand2[9].x, hand1[9].y - hand2[9].y);
                const chắpTayDistance = (distWrist + distMcp) / 2;

                debugDiv.innerHTML = `Độ khít chắp tay: ${(100 - chắpTayDistance*400).toFixed(0)}% (Cần đạt > 40% để kích hoạt)`;

                if (chắpTayDistance < 0.15 && !isHaloAnimating) {
                    triggerHaloEffect();
                }
            } else {
                debugDiv.innerHTML = `Đã nhận diện ${detectedHandsCount} tay • Hãy lau màn hình`;
            }
        } else {
            debugDiv.innerHTML = "Đang chờ bàn tay xuất hiện...";
        }
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.6, // Tăng nhẹ thông số tự tin để lọc nhiễu chính xác hơn
        minTrackingConfidence: 0.6
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({ image: videoElement }); },
        width: 1280,
        height: 720
    });
    camera.start().catch(err => { debugDiv.innerHTML = "Lỗi kết nối Camera!"; });
</script>

</body>
</html>
